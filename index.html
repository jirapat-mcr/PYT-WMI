<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .btn-huge { height: 80px; font-size: 1.5rem; border-radius: 15px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select { font-size: 1.2rem !important; padding: 12px !important; }
    </style>
</head>
<body class="p-4">

    <div id="screen-login" class="max-w-md mx-auto mt-20 p-8 card">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-600">Mercury Login</h1>
        <div class="space-y-6">
            <div>
                <label class="block text-gray-700 mb-2">Username</label>
                <input type="text" id="username" class="w-full border rounded-lg" placeholder="Enter ID">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full border rounded-lg" placeholder="Enter Password">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg text-xl hover:bg-blue-700">LOGIN</button>
        </div>
        <p id="login-err" class="text-red-500 mt-4 text-center hidden">Invalid ID or Password</p>
    </div>

    <div id="screen-menu" class="max-w-2xl mx-auto hidden">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Main Menu</h2>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="showTransactMoveOrder()" class="btn-huge bg-blue-500 text-white flex items-center justify-center gap-4">
                <i class="fas fa-exchange-alt"></i> Transact Move Order
            </button>
            <button class="btn-huge bg-gray-300 text-gray-500 cursor-not-allowed">PO Receipt</button>
            <button class="btn-huge bg-gray-300 text-gray-500 cursor-not-allowed">Move Order</button>
            <button class="btn-huge bg-gray-300 text-gray-500 cursor-not-allowed">Onhand</button>
            <button class="btn-huge bg-gray-300 text-gray-500 cursor-not-allowed">Transaction-History</button>
        </div>
    </div>

    <div id="screen-mo-list" class="max-w-4xl mx-auto hidden">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showMenu()" class="text-blue-600 text-xl"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 class="text-2xl font-bold">Move Order Documents</h2>
        </div>
        
        <div class="card p-4 mb-6 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-gray-600">MO No.</label>
                <input type="text" id="search-mo" class="w-full border rounded mt-1">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600">Date</label>
                <input type="date" id="search-date" class="w-full border rounded mt-1">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600">Status</label>
                <select id="search-status" class="w-full border rounded mt-1">
                    <option value="Pending Transfer">Pending Transfer</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600">Department</label>
                <input type="text" id="search-dept" value="Drug Store" class="w-full border rounded mt-1">
            </div>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left text-lg">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-4">MO No.</th>
                        <th class="p-4">Date</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Dept.</th>
                    </tr>
                </thead>
                <tbody id="mo-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="screen-mo-detail" class="max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showTransactMoveOrder()" class="text-blue-600 text-xl"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 class="text-2xl font-bold" id="detail-mo-title">MO: XXXX</h2>
            <button onclick="startScanner()" class="bg-orange-500 text-white px-6 py-3 rounded-lg font-bold">
                <i class="fas fa-qrcode"></i> SCAN QR
            </button>
        </div>

        <div id="item-list-container" class="space-y-4">
            </div>
    </div>

    <div id="screen-scanner" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="p-4 flex justify-between">
            <button onclick="stopScanner()" class="text-white text-xl">Cancel</button>
            <span class="text-white font-bold">Scanning...</span>
        </div>
        <div id="reader" class="flex-1"></div>
    </div>

    <div id="screen-item-receive" class="max-w-2xl mx-auto hidden mt-10 card p-8">
        <h2 class="text-2xl font-bold mb-6 text-blue-600">Receive Item</h2>
        <div class="space-y-6">
            <div>
                <label class="font-bold text-gray-600">Item Code</label>
                <input type="text" id="rec-item-code" readonly class="w-full bg-gray-100 border rounded p-4 text-xl">
            </div>
            <div>
                <label class="font-bold text-gray-600">Description</label>
                <input type="text" id="rec-item-desc" readonly class="w-full bg-gray-100 border rounded p-4">
            </div>
            <div>
                <label class="font-bold text-gray-600">Expired Date</label>
                <input type="text" id="rec-item-exp" readonly class="w-full bg-gray-100 border rounded p-4">
            </div>
            <div>
                <label class="font-bold text-gray-600 text-red-600">Receipt Qty</label>
                <input type="number" id="rec-qty" class="w-full border-2 border-blue-500 rounded p-4 text-2xl font-bold">
            </div>
            
            <div class="flex gap-4 pt-4">
                <button onclick="showDetail(currentMO)" class="flex-1 bg-gray-500 text-white py-4 rounded-xl text-xl font-bold">Summary</button>
                <button onclick="saveAndNext()" class="flex-1 bg-green-600 text-white py-4 rounded-xl text-xl font-bold">Next Scan</button>
            </div>
        </div>
    </div>

    <script>
        // --- MOCK DATA ---
        const mockMOs = [
            { no: 'MO-2023-001', date: new Date().toISOString().split('T')[0], status: 'Pending Transfer', dept: 'Drug Store' },
            { no: 'MO-2023-002', date: new Date().toISOString().split('T')[0], status: 'Pending Transfer', dept: 'Drug Store' }
        ];

        const mockItems = {
            'MO-2023-001': [
                { code: 'ITEM-001', desc: 'Paracetamol 500mg', reqQty: 100, recQty: 0, exp: '2025-12-01' },
                { code: 'ITEM-002', desc: 'Alcohol 70%', reqQty: 50, recQty: 0, exp: '2024-06-15' }
            ],
            'MO-2023-002': [
                { code: 'ITEM-003', desc: 'Surgical Mask', reqQty: 500, recQty: 0, exp: '2026-01-10' }
            ]
        };

        let currentMO = '';
        let html5QrCode;

        // --- NAVIGATION ---
        function showScreen(id) {
            ['screen-login', 'screen-menu', 'screen-mo-list', 'screen-mo-detail', 'screen-scanner', 'screen-item-receive'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        // --- LOGIN LOGIC ---
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'mercury' && pass === 'welcome') {
                showMenu();
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        function showMenu() { showScreen('screen-menu'); }

        // --- MO LIST LOGIC ---
        function showTransactMoveOrder() {
            showScreen('screen-mo-list');
            document.getElementById('search-date').value = new Date().toISOString().split('T')[0];
            renderMOList();
        }

        function renderMOList() {
            const tbody = document.getElementById('mo-table-body');
            tbody.innerHTML = mockMOs.map(mo => `
                <tr class="border-b hover:bg-blue-50 cursor-pointer" onclick="showDetail('${mo.no}')">
                    <td class="p-4 font-bold text-blue-600">${mo.no}</td>
                    <td class="p-4">${mo.date}</td>
                    <td class="p-4"><span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-sm">${mo.status}</span></td>
                    <td class="p-4">${mo.dept}</td>
                </tr>
            `).join('');
        }

        // --- DETAIL LOGIC ---
        function showDetail(moNo) {
            currentMO = moNo;
            showScreen('screen-mo-detail');
            document.getElementById('detail-mo-title').innerText = `MO: ${moNo}`;
            renderItemList();
        }

        function renderItemList() {
            const container = document.getElementById('item-list-container');
            const items = mockItems[currentMO] || [];
            container.innerHTML = items.map(it => `
                <div class="card p-4 flex justify-between items-center">
                    <div>
                        <div class="font-bold text-lg">${it.code}</div>
                        <div class="text-gray-600 text-sm">${it.desc}</div>
                        <div class="text-xs text-gray-400">Exp: ${it.exp}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-gray-500 font-bold">Qty</div>
                        <div class="text-2xl font-bold ${it.recQty > 0 ? 'text-green-600' : 'text-gray-400'}">
                            ${it.recQty} / ${it.reqQty}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- SCANNER LOGIC ---
        function startScanner() {
            showScreen('screen-scanner');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess
            );
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    showScreen('screen-mo-detail');
                });
            }
        }

        function onScanSuccess(decodedText) {
            const items = mockItems[currentMO];
            const item = items.find(i => i.code === decodedText);

            if(!item) {
                alert("Error: ไม่พบ item " + decodedText + " ในเอกสารใบนี้!");
                return;
            }

            html5QrCode.stop().then(() => {
                showItemReceive(item);
            });
        }

        function showItemReceive(item) {
            showScreen('screen-item-receive');
            document.getElementById('rec-item-code').value = item.code;
            document.getElementById('rec-item-desc').value = item.desc;
            document.getElementById('rec-item-exp').value = item.exp;
            document.getElementById('rec-qty').value = item.reqQty; // Default เป็น Request Qty
        }

        function saveAndNext() {
            const code = document.getElementById('rec-item-code').value;
            const qty = parseInt(document.getElementById('rec-qty').value);
            
            // Update Data
            const item = mockItems[currentMO].find(i => i.code === code);
            item.recQty = qty;

            // Go back to scan next
            startScanner();
        }
    </script>
</body>
</html>
